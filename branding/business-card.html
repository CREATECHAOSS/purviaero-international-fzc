<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purvi Aero - Business Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#000543',
            secondary: '#0071CE',
            accent: '#00999F',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Print Setup for 3.5" x 2" standard US Business Card */
    @page {
      size: 3.5in 2in;
      margin: 0;
    }
    body {
      background-color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
    }
    .card {
      width: 3.5in;
      height: 2in;
      background-color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    @media print {
      body {
        background-color: transparent;
        padding: 0;
        gap: 0;
      }
      .card {
        box-shadow: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <!-- Card Front (Dark Theme) -->
  <div class="card bg-primary text-white flex flex-col items-center justify-center relative">
    <!-- Abstract Accent -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-secondary opacity-20 rounded-bl-full blur-2xl"></div>
    <div class="absolute bottom-0 left-0 w-24 h-24 bg-accent opacity-20 rounded-tr-full blur-xl"></div>
    
    <div class="relative z-10 flex flex-col items-center">
      <img src="../public/icon-light.svg" alt="Icon" class="h-10 mb-2" />
      <h1 class="font-display font-extrabold text-xl tracking-widest leading-none">PURVI AERO</h1>
      <h2 class="font-display font-bold text-[7px] text-secondary tracking-[0.4em] uppercase mt-1">International FZC</h2>
      <div class="w-8 h-0.5 bg-accent my-2 rounded-full"></div>
      <p class="font-sans font-medium text-[6px] text-white/50 tracking-widest uppercase italic">Keeping the World Airborne</p>
    </div>
  </div>

  <!-- Card Back (Light Theme) -->
  <div class="card bg-white text-primary flex items-center p-6 relative">
    <div class="absolute top-0 right-0 w-1 h-full bg-secondary"></div>
    
    <div class="flex-1">
      <h1 class="font-display font-extrabold text-lg text-primary leading-none mb-1">YOUR NAME</h1>
      <h2 class="font-sans font-semibold text-[8px] text-secondary uppercase tracking-widest mb-4">Your Job Title</h2>
      
      <div class="space-y-2 font-sans text-[7px]">
        <div class="flex items-center gap-2">
          <svg class="w-3 h-3 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <span class="font-medium text-gray-700">+971 00 000 0000</span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-3 h-3 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span class="font-medium text-gray-700">name@purviaero.com</span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-3 h-3 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
          <span class="font-medium text-gray-700">www.purviaero.com</span>
        </div>
        <div class="flex items-center gap-2 pt-1">
          <svg class="w-3 h-3 text-accent shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="font-medium text-gray-700 leading-tight">PO Box XXXX, Business Center<br>Dubai, United Arab Emirates</span>
        </div>
      </div>
    </div>
    
    <!-- Mini Logo on Right -->
    <div class="w-1/3 flex flex-col items-center justify-center border-l border-gray-100 pl-4 ml-4">
      <img src="../public/new/iCON.svg" alt="Icon" class="h-8 mb-1" />
      <h3 class="font-display font-extrabold text-[8px] tracking-widest text-primary">PURVI AERO</h3>
      <h4 class="font-display font-bold text-[4px] tracking-widest text-secondary uppercase mt-0.5">International</h4>
    </div>
  </div>

</body>
</html>
