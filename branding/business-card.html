  <title>Purvi Aero - Business Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#000543',
            secondary: '#0071CE',
            accent: '#00999F',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @page {
      size: 3.5in 2in;
      margin: 0;
    }
    body {
      background-color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
    }
    .card {
      width: 3.5in;
      height: 2in;
      background-color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    @media print {
      body {
        background-color: transparent;
        padding: 0;
        gap: 0;
      }
      .card {
        box-shadow: none;
        page-break-after: always;
      }
    }
  </style>
