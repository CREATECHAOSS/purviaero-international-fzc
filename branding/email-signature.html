<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Purvi Aero Email Signature</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;500;700&display=swap');
  </style>
</head>
<body>
  <!-- 
    Instructions:
    Open this file in your browser, select the entire signature (Ctrl+A / Cmd+A), 
    copy it (Ctrl+C / Cmd+C), and paste it directly into your Outlook, Gmail, or Apple Mail signature settings.
  -->
  <table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Inter', Arial, sans-serif; max-width: 600px; border-collapse: collapse;">
    <tr>
      <!-- Icon/Logo Column -->
      <td valign="top" style="padding-right: 20px; border-right: 2px solid #00999F;">
        <img src="https://purviaero.com/new/iCON.svg" alt="Purvi Aero Icon" width="60" height="60" style="display: block; margin-top: 4px;" />
      </td>
      
      <!-- Details Column -->
      <td valign="top" style="padding-left: 20px;">
        <table cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding-bottom: 4px;">
              <span style="font-family: 'Outfit', Arial, sans-serif; font-size: 18px; font-weight: 800; color: #000543; letter-spacing: 0.05em; display: block;">YOUR NAME</span>
              <span style="font-family: 'Inter', Arial, sans-serif; font-size: 13px; font-weight: 600; color: #0071CE; display: block; margin-top: 2px;">Your Job Title</span>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom: 12px;">
              <table cellpadding="0" cellspacing="0" border="0" style="margin-top: 4px;">
                <tr>
                  <td style="font-family: 'Outfit', Arial, sans-serif; font-size: 12px; font-weight: 800; color: #000543; letter-spacing: 0.1em; line-height: 1;">
                    PURVI AERO
                  </td>
                  <td style="padding-left: 6px; font-family: 'Outfit', Arial, sans-serif; font-size: 8px; font-weight: 700; color: #0071CE; letter-spacing: 0.2em; text-transform: uppercase; line-height: 1; padding-top: 2px;">
                    INTERNATIONAL FZC
                  </td>
                </tr>
              </table>
              <div style="font-family: 'Inter', Arial, sans-serif; font-size: 10px; font-weight: 500; color: #666666; font-style: italic; margin-top: 4px; letter-spacing: 0.05em;">
                Keeping the World Airborne
              </div>
            </td>
          </tr>
          <tr>
            <td style="font-family: 'Inter', Arial, sans-serif; font-size: 12px; line-height: 1.5; color: #374151;">
              <strong>P:</strong> <a href="tel:+1234567890" style="color: #374151; text-decoration: none;">+971 00 000 0000</a><br>
              <strong>E:</strong> <a href="mailto:name@purviaero.com" style="color: #0071CE; text-decoration: none;">name@purviaero.com</a><br>
              <strong>W:</strong> <a href="https://purviaero.com" style="color: #0071CE; text-decoration: none;">www.purviaero.com</a>
            </td>
          </tr>
          <tr>
            <td style="padding-top: 12px;">
              <span style="font-size: 10px; color: #9CA3AF; line-height: 1.4; display: block; max-width: 400px;">
                The information contained in this communication from the sender is confidential. It is intended solely for use by the recipient.
              </span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
